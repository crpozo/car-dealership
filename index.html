<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dealer Performance Hub — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#191D33; --muted:#6B7186; --faint:#A9AFC2; --line:#E7E9F2; --line-soft:#F0F2F8;
  --ground:#F7F8FB; --card:#FFFFFF;
  --accent:#4F46E5; --accent-deep:#3B34C4; --accent-soft:#EEF0FE; --accent-softer:#F5F6FF;
  --lime:#D9F26E; --lime-ink:#3A4310;
  --good:#1F9D5B; --good-bg:#E6F6EE; --warn:#8A5A00; --warn-bg:#FFF3D3; --risk:#E5484D; --risk-bg:#FDEBEC;
  --demo:#7C5CD6; --demo-bg:#F1EBFE;
  --c-internet:#4F46E5; --c-phone:#74A4F5; --c-walkin:#3BC98A; --c-prev:#A78BFA; --c-referral:#F5B63F; --c-other:#C3C9D9;
  --sans:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --shadow:0 1px 2px rgba(25,29,51,.04),0 4px 16px rgba(25,29,51,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
button{font-family:inherit}
svg.ic{width:19px;height:19px;flex:none;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}

/* ---------- shell ---------- */
.shell{display:flex;min-height:100vh}
.side{width:236px;flex:none;background:var(--card);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;height:100vh}
.logo{display:flex;align-items:center;gap:9px;padding:2px 8px 18px}
.logo .pmark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#7C6CF0);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.logo .nm{font-size:17px;font-weight:800;letter-spacing:-.02em}.logo .nm span{color:var(--accent)}
.logo .tag{font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--lime-ink);background:var(--lime);border-radius:4px;padding:2.5px 6px}
.ngroup{font-size:10.5px;font-weight:700;letter-spacing:.11em;color:var(--muted);text-transform:uppercase;padding:14px 10px 6px}
.nav{appearance:none;border:0;background:none;display:flex;align-items:center;gap:10px;width:100%;text-align:left;font-size:13.5px;font-weight:600;color:#4A506A;border-radius:9px;padding:9px 10px;cursor:pointer}
.nav:hover{background:var(--ground)}
.nav.active{background:var(--accent-soft);color:var(--accent)}
.top{display:flex;align-items:center;gap:14px;background:var(--card);border-bottom:1px solid var(--line);padding:10px 26px;position:sticky;top:0;z-index:20}
.searchwrap{display:flex;align-items:center;gap:8px;background:var(--ground);border:1px solid var(--line);border-radius:10px;padding:8px 12px;width:min(420px,100%);color:var(--muted)}
.searchwrap input{border:0;background:none;outline:none;font:inherit;color:var(--ink);flex:1;min-width:0}
.searchwrap kbd{font-family:inherit;font-size:11px;font-weight:700;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:5px;padding:1.5px 6px}
.top .asof{margin-left:auto;font-size:12.5px;color:var(--muted);white-space:nowrap}
.top .asof b{color:var(--ink)}
.iconbtn{appearance:none;border:1px solid var(--line);background:var(--card);color:#4A506A;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
.iconbtn:hover{background:var(--ground)}
.iconbtn.avatar{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.maincol{flex:1;min-width:0;display:flex;flex-direction:column}
.content{padding:26px;max-width:1280px;width:100%;margin:0 auto}

/* ---------- page head ---------- */
.pagehead{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.pagehead h1{font-size:26px;font-weight:800;letter-spacing:-.025em;margin:0}
.pagehead h2{font-size:18px;font-weight:800;letter-spacing:-.02em;margin:0}
.sr-only{position:absolute;width:1px;height:1px;clip-path:inset(50%);overflow:hidden;white-space:nowrap}
.pagehead .sub{margin:3px 0 0;color:var(--muted);font-size:13.5px}
.pagehead .actions{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.datechip{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#4A506A;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8.5px 13px}
.btn{appearance:none;border:0;display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;border-radius:10px;padding:9.5px 16px;cursor:pointer}
.btn.primary{background:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-deep)}
.crumb{font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
a.plain{color:var(--accent);font-weight:700;text-decoration:none}
a.plain:hover{text-decoration:underline}
.crumb select{font-family:inherit;font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:5px 8px;background:#fff;color:var(--ink)}

/* ---------- stat cards ---------- */
.strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
.stat .hd{display:flex;align-items:center;gap:10px}
.stat .icotile{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none}
.stat .icotile svg.ic{width:18px;height:18px}
.ico-purple{background:var(--accent-soft);color:var(--accent)}
.ico-blue{background:#E8F1FE;color:#2A6DD9}
.ico-green{background:var(--good-bg);color:var(--good)}
.ico-red{background:var(--risk-bg);color:var(--risk)}
.stat .lbl{font-size:13px;font-weight:600;color:#4A506A}
.stat .val{font-size:30px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;margin-top:8px}
.stat .val.risk{color:var(--risk)}
.stat .aux{font-size:12px;color:var(--muted);margin-top:1px}
.stat .aux.demo-warn{color:var(--demo);font-weight:600}

/* ---------- panel ---------- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:20px}
.panel-head{display:flex;align-items:center;gap:8px 14px;flex-wrap:wrap;padding:15px 20px;border-bottom:1px solid var(--line-soft)}
.panel-head .ttl{font-size:16px;font-weight:800;letter-spacing:-.01em;margin:0}
.panel-head .ttl .sub{font-weight:500;color:var(--muted);font-size:12.5px;margin-left:8px;letter-spacing:0}
.panel-head .count{font-size:12.5px;color:var(--muted)}
.panel-head .filters{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.flabel{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:7px}
.flabel select{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);border:1px solid var(--line);border-radius:9px;background:#fff;padding:6.5px 8px;letter-spacing:0;text-transform:none}
.panel-body{padding:18px 20px}
.legend{font-size:12px;color:var(--muted);margin:0;padding:13px 20px;border-top:1px solid var(--line-soft)}

/* switch */
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;font-weight:600;color:#4A506A;user-select:none}
.switch em{font-style:normal;color:var(--muted);font-weight:500}
.switch input{position:absolute;opacity:0;width:1px;height:1px}
.switch .track{width:38px;height:22px;border-radius:99px;background:#D9DDEA;border:1px solid #767E97;position:relative;transition:background .15s,border-color .15s;flex:none}
.switch .track::after{content:"";position:absolute;top:1.5px;left:1.5px;width:17px;height:17px;border-radius:99px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .15s}
.switch input:checked + .track{background:var(--accent);border-color:var(--accent)}
.switch input:checked + .track::after{transform:translateX(16px)}
.switch input:focus-visible + .track{outline:2px solid var(--accent);outline-offset:2px}

/* ---------- chips & pills ---------- */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;border:1px solid var(--line);color:#4A506A;border-radius:99px;padding:2.5px 9px;background:#fff}
.chip .dot{width:6px;height:6px;border-radius:99px;background:var(--faint)}
.chip.crm .dot{background:var(--good)}
.chip.tool .dot{background:var(--c-referral)}
.chip.ok{color:var(--good);border-color:#BCE4CE}.chip.ok .dot{background:var(--good)}
.chip.pend{color:var(--warn);border-color:#EBD9A0}.chip.pend .dot{background:var(--warn)}
.chip.no{color:var(--risk);border-color:#F3C1C3}.chip.no .dot{background:var(--risk)}
.chip.unk{color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;border-radius:99px;padding:4px 11px;white-space:nowrap}
.pill::before{content:"";width:7px;height:7px;border-radius:99px;background:currentColor}
.pill.good{color:var(--good);background:var(--good-bg)}
.pill.watch{color:var(--warn);background:var(--warn-bg)}
.pill.risk{color:var(--risk);background:var(--risk-bg)}
.badge-demo{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.09em;color:var(--demo);background:var(--demo-bg);border-radius:5px;padding:2px 7px;vertical-align:2px}
.flag{font-size:10px;font-weight:800;letter-spacing:.06em;border-radius:5px;padding:2px 7px;white-space:nowrap;display:inline-block}
.flag.warn{color:#8A5A00;background:var(--warn-bg)}
.flag.gray{color:var(--muted);background:var(--line-soft)}
.delta{font-size:11.5px;font-weight:700;white-space:nowrap}
.delta.up{color:#177A47} .delta.down{color:#C7353B} .delta.flat{color:var(--muted)}
.note{font-size:12px;color:var(--muted)}

/* ---------- stores table ---------- */
.tblwrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13.5px}
th,td{padding:9px 14px;white-space:nowrap}
thead th{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);text-align:right}
thead th:first-child{text-align:left}
th.left{text-align:left}
tbody td{border-bottom:1px solid var(--line-soft)}
tbody tr:last-child td{border-bottom:0}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.stores-tbl th:first-child,.stores-tbl td:first-child{padding-left:20px}
.stores-tbl th:last-child,.stores-tbl td:last-child{padding-right:20px}
.stores-tbl tbody tr.srow{cursor:pointer}
.stores-tbl tbody tr.srow:hover td{background:var(--accent-softer)}
.stores-tbl td{padding-top:14px;padding-bottom:14px;vertical-align:middle}
.sname{font-size:15px;font-weight:800;letter-spacing:-.01em}
.smeta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:5px}
.speriod{font-size:12px;color:var(--muted)}
.sflags{margin-top:6px;display:flex;gap:6px}
.cellv .v{font-size:15.5px;font-weight:800;font-variant-numeric:tabular-nums}
.cellv .delta{display:block;margin-top:1px}
.mixbar{display:flex;height:8px;border-radius:99px;overflow:hidden;background:var(--line-soft);width:190px}
.mixbar i{display:block;height:100%}
.gobtn{appearance:none;border:1px solid var(--line);background:var(--card);color:#4A506A;width:32px;height:32px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.gobtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.empty{padding:26px;text-align:center;color:var(--muted)}

/* ---------- detail tables ---------- */
thead tr.groups th{border-bottom:0;padding-bottom:0;color:var(--accent);text-align:center}
thead tr.groups th:first-child{text-align:left}
td.name{font-weight:600}
tr.lvl1 td.name{font-weight:700}
tr.sub td{background:#FAFBFE;font-size:12.5px}
tr.sub td.name{padding-left:32px;font-weight:500;color:var(--muted)}
tr.sub2 td{background:#F5F7FC;font-size:12px}
tr.sub2 td.name{padding-left:50px;font-weight:500;color:var(--muted)}
tfoot td{border-top:2px solid var(--line);font-weight:800;background:#FAFBFE}
.tgl{appearance:none;border:0;background:none;cursor:pointer;font:inherit;font-weight:inherit;color:inherit;padding:0;display:inline-flex;align-items:center;gap:6px}
.tgl .chev{display:inline-block;width:0;height:0;border-left:5px solid var(--faint);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform .12s}
.tgl[aria-expanded=true] .chev{transform:rotate(90deg)}
th.sortable{cursor:pointer;user-select:none;padding:0}
th.sortable:hover{color:var(--accent)}
th.sortable .arr{font-size:9px;margin-left:3px}
.sorth{appearance:none;background:none;border:0;font:inherit;color:inherit;cursor:pointer;padding:9px 14px;width:100%;text-align:inherit;text-transform:inherit;letter-spacing:inherit}
.bar{display:inline-block;height:7px;border-radius:3px;background:var(--accent);opacity:.55;vertical-align:1px;margin-right:7px}
.rowflag{font-size:10px;font-weight:800;color:#8A5A00;background:var(--warn-bg);border-radius:4px;padding:1px 6px;margin-left:7px;letter-spacing:.04em;white-space:nowrap}
.shown-pill{display:inline-block;min-width:52px;text-align:right;font-weight:700;border-radius:6px;padding:1px 7px}
.shown-pill.good{color:var(--good);background:var(--good-bg)}
.shown-pill.warn{color:var(--warn);background:var(--warn-bg)}
.shown-pill.na{color:var(--muted)}
details.extra{margin:10px 20px 16px}
details.extra summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--accent)}
details.extra .tblwrap{border:1px solid var(--line-soft);border-radius:10px;margin-top:8px}
.footnotes{font-size:12px;color:var(--muted);padding:12px 20px;border-top:1px solid var(--line-soft)}
.footnotes p{margin:3px 0}

/* ---------- detail header ---------- */
.dhead{display:flex;flex-wrap:wrap;align-items:center;gap:12px}
.dhead h1{font-size:26px;font-weight:800;letter-spacing:-.025em;margin:0}
.dmeta{margin-top:7px;font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.banner{margin:14px 0 0;padding:10px 14px;border-radius:10px;font-size:12.5px;font-weight:500}
.banner.demo{background:var(--demo-bg);color:var(--demo);font-weight:600}
.banner.info{background:var(--accent-soft);color:var(--accent-deep)}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin:18px 0 20px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
.tile .lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.tile .v{font-size:24px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;margin-top:3px}
.tile .vs{font-size:12px;color:var(--muted);margin-top:1px}
.pagefoot{margin:6px 2px 30px;font-size:12px;color:var(--muted)}

/* ---------- sources / settings / help ---------- */
.src-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;margin-bottom:20px}
.src{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:17px 19px;box-shadow:var(--shadow)}
.src .topline{display:flex;align-items:baseline;gap:9px}
.src .nm{font-size:15.5px;font-weight:800}
.src .ty{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.src .cov{font-size:12.5px;color:var(--muted);margin:3px 0 10px}
.src .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.flow{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.flow .step{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 17px;box-shadow:var(--shadow)}
.flow .n{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:var(--accent);text-transform:uppercase}
.flow .t{font-weight:800;margin:4px 0 3px}
.flow .d{font-size:12.5px;color:var(--muted)}
.prose{max-width:720px;font-size:13.5px}
.prose h2{font-size:14px;font-weight:800;margin:18px 0 6px}
.prose p,.prose li{color:#3E445C}
.kv{display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px}
.kv:last-child{border-bottom:0}
.kv .k{color:#4A506A;font-weight:600}
.kv .v{font-weight:700;font-variant-numeric:tabular-nums}

/* ---------- responsive ---------- */
@media (max-width:960px){
  .searchwrap input,.flabel select,.crumb select{font-size:16px}
  .shell{flex-direction:column}
  .side{width:100%;height:auto;position:static;flex-direction:row;align-items:center;flex-wrap:wrap;gap:4px;padding:10px 14px;border-right:0;border-bottom:1px solid var(--line)}
  .logo{padding:0 8px 0 0}
  .ngroup{display:none}
  .nav{width:auto;padding:7px 11px}
  .top{padding:10px 14px;flex-wrap:wrap}
  .top .asof{display:none}
  .content{padding:16px 14px}
  .mixbar{width:120px}
}
</style>

<div class="shell">
  <aside class="side">
    <div class="logo">
      <span class="pmark">P</span>
      <span class="nm">Pace<span>Board</span></span>
      <span class="tag">PROTOTYPE</span>
    </div>
    <div class="ngroup">General</div>
    <button class="nav" data-view="overview"><svg class="ic" viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="7" height="7" rx="1.6"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.6"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.6"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.6"/></svg>Store overview</button>
    <button class="nav" data-view="sources"><svg class="ic" viewBox="0 0 24 24"><ellipse cx="12" cy="5.5" rx="7.5" ry="3"/><path d="M4.5 5.5v13c0 1.7 3.4 3 7.5 3s7.5-1.3 7.5-3v-13"/><path d="M4.5 12c0 1.7 3.4 3 7.5 3s7.5-1.3 7.5-3"/></svg>Data sources</button>
    <div class="ngroup">Support</div>
    <button class="nav" data-view="settings"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.2 12a7.2 7.2 0 0 0-.14-1.4l2.1-1.63-2-3.46-2.48 1a7.3 7.3 0 0 0-2.42-1.4L13.9 2.5h-3.8l-.36 2.6a7.3 7.3 0 0 0-2.42 1.41l-2.48-1-2 3.46 2.1 1.63a7.2 7.2 0 0 0 0 2.8l-2.1 1.63 2 3.46 2.48-1a7.3 7.3 0 0 0 2.42 1.4l.36 2.61h3.8l.36-2.6a7.3 7.3 0 0 0 2.42-1.41l2.48 1 2-3.46-2.1-1.63c.1-.45.14-.92.14-1.4Z"/></svg>Settings</button>
    <button class="nav" data-view="help"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.4 9.2a2.7 2.7 0 0 1 5.25.9c0 1.8-2.65 2.2-2.65 3.6"/><circle cx="12" cy="16.9" r=".4" fill="currentColor" stroke="none"/></svg>Help</button>
  </aside>
  <div class="maincol">
    <header class="top">
      <div class="searchwrap">
        <svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="m20 20-4.4-4.4"/></svg>
        <input id="g-q" type="search" placeholder="Search stores…" aria-label="Search stores">
        <kbd id="g-kbd">⌘F</kbd>
      </div>
      <div class="asof" id="asof"></div>
      <button class="iconbtn" title="Notifications — nothing new" aria-label="Notifications"><svg class="ic" viewBox="0 0 24 24"><path d="M18 9.5a6 6 0 1 0-12 0c0 5-2 6-2 6h16s-2-1-2-6"/><path d="M10 19a2.2 2.2 0 0 0 4 0"/></svg></button>
      <button class="iconbtn avatar" title="Signed in as Scott (prototype)" aria-label="Account"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="8.5" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg></button>
    </header>
    <main class="content" id="app"></main>
    <div id="live-status" role="status" class="sr-only"></div>
  </div>

const $ = (s, el) => (el || document).querySelector(s);

const fmtN = v => {
  if (v == null) return "—";
  return Number.isInteger(v) ? v.toLocaleString("en-US") : v.toLocaleString("en-US", { minimumFractionDigits: 1, maximumFractionDigits: 1 });

const fmtPct = (v, dash) => (v == null || (dash && !v)) ? "—" : (v * 100).toFixed(1).replace(/\.0$/, "") + "%";
const deltaPct = (cur, prior) => (prior == null || prior === 0) ? null : (cur - prior) / prior * 100;
function deltaHtml(cur, prior) {
  if (prior == null) return "";

  if (d == null) return cur > 0 ? '<span class="delta up">new</span>' : '<span class="delta flat">±0%</span>';
  const cls = d > 0.5 ? "up" : d < -0.5 ? "down" : "flat";
  const sym = d > 0.5 ? "▲" : d < -0.5 ? "▼" : "•";

}

  const pri = s.priorPeriod.label.replace(", 2026", "").replace(" (same days)", "");
  return `${cur} · vs ${pri}`;
};
const isTwoDay = s => /Jul 1–2/.test(s.currentPeriod.label) && !s.demo;

/* ---------------- status model ---------------- */
function storeStatus(s) {
  const c = s.kpiCurrent.total, p = s.kpiPrior && s.kpiPrior.total;
  if (p) {
    const dl = deltaPct(c.goodLeads, p.goodLeads), ds = deltaPct(c.sold, p.sold);
    const badL = dl != null && dl <= -25, badS = ds != null && ds <= -25;
    const softL = dl != null && dl <= -10, softS = ds != null && ds <= -10;
    const why = `Leads ${dl == null ? "n/a" : (dl > 0 ? "+" : "") + dl.toFixed(0) + "%"}, sold ${ds == null ? "n/a" : (ds > 0 ? "+" : "") + ds.toFixed(0) + "%"} vs same days last month`;
    if (badL && badS) return { level: "risk", label: "At risk", why };
    if (badL || badS || softL || softS) return { level: "watch", label: "Watch", why };
    return { level: "good", label: "On pace", why };
  }
  const closing = c.goodLeads ? c.sold / c.goodLeads : 0;
  const shown = s.salesTeamTotals ? s.salesTeamTotals.shownPct : null;
  const okClose = closing >= 0.25, okShown = shown == null || shown >= 0.7;
  const why = `No prior-month baseline — benchmarked: closing ${(closing * 100).toFixed(0)}% (target 25%)` + (shown != null ? `, appt-shown ${(shown * 100).toFixed(0)}% (target 70%)` : "");
  if (okClose && okShown) return { level: "good", label: "On pace", why };
  if (okClose || okShown) return { level: "watch", label: "Watch", why };
  return { level: "risk", label: "At risk", why };
}
const statusPill = st => `<span class="pill ${st.level}" title="${esc(st.why)}">${st.label}</span>`;

/* ---------------- state ---------------- */
const state = { crm: "all", tool: "all", status: "all", q: "", demo: false, sort: "status" };
const teamSort = { key: "sold", dir: -1 };

function visibleStores() {
  return DATA.stores.filter(s => {
    if (!state.demo && s.demo) return false;
    if (state.crm !== "all" && s.crm !== state.crm) return false;
    if (state.tool !== "all" && !(s.tools || []).includes(state.tool)) return false;
    if (state.status !== "all" && storeStatus(s).level !== state.status) return false;
    if (state.q && !s.name.toLowerCase().includes(state.q.toLowerCase())) return false;
    return true;
  });
}
const STORE_SORTERS = {
  status: (a, b) => ({ risk: 0, watch: 1, good: 2 }[storeStatus(a).level] - { risk: 0, watch: 1, good: 2 }[storeStatus(b).level]) || a.name.localeCompare(b.name),
  name: (a, b) => a.name.localeCompare(b.name),

  sold: (a, b) => b.kpiCurrent.total.sold - a.kpiCurrent.total.sold,
};

function mixHtml(s) {
  const rows = s.kpiCurrent.byLeadType.filter(b => b.metrics.goodLeads > 0);

function exportCsv() {

    const d = (cur, pri) => { const x = p ? deltaPct(cur, pri) : null; return x == null ? "" : x.toFixed(1); };

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" }));

      <td class="num">${sp}</td>
      <td class="num"><span class="bar" style="width:${Math.round(r.calls / maxCalls * 60)}px"></span>${fmtN(r.calls)}</td>
      <td class="num">${fmtN(r.emails)}</td><td class="num">${fmtN(r.texts)}</td>${mat}</tr>`;
  }).join("");
  const t = s.salesTeamTotals;
  const foot = t ? `<tr><td class="name">TEAM TOTAL</td><td class="num">${fmtN(t.goodLeads)}</td><td class="num">${fmtN(t.sold)}</td><td class="num">${fmtN(t.apptsScheduled)}</td><td class="num">${fmtN(t.apptsShown)}</td><td class="num">${fmtPct(t.shownPct)}</td><td class="num">${fmtN(t.calls)}</td><td class="num">${fmtN(t.emails)}</td><td class="num">${fmtN(t.texts)}</td>${matCols.map(() => '<td class="num"></td>').join("")}</tr>` : "";
  const matOther = (s.matadorOther && s.matadorOther.length) ? `
    <details class="extra"><summary>Matador users not on the sales report (${s.matadorOther.length}) — managers, BDC &amp; admins</summary>
    <div class="tblwrap"><table>
      <thead><tr><th>User</th><th class="left">Role</th><th class="num">Msgs sent</th><th class="num">Videos</th><th class="num">Clients msgd</th><th class="num">Assigned</th><th class="num">Last activity</th></tr></thead>
      <tbody>${s.matadorOther.map(m => `<tr><td class="name">${esc(m.name)}</td><td>${esc(m.role)}</td><td class="num">${fmtN(m.messagesSent)}</td><td class="num">${fmtN(m.videosSent)}</td><td class="num">${fmtN(m.clientsMessaged)}</td><td class="num">${fmtN(m.assignedClients)}</td><td class="num">${esc(m.lastActivity)}</td></tr>`).join("")}</tbody>
    </table></div></details>` : "";
  return `<div class="tblwrap"><table id="team-tbl">
      <thead>${hasMat ? `<tr class="groups"><th colspan="9">CRM (${esc(s.crm)})</th><th colspan="3">Matador AI</th></tr>` : ""}<tr>${head}</tr></thead>
      <tbody>${rows}</tbody><tfoot>${foot}</tfoot>
    </table></div>
    <div class="footnotes">
      <p>Click a column to sort. Shown % is green at ≥ 70%. “NO OUTBOUND” = zero calls, emails and texts logged this period. CRM house accounts (e.g. store-level users) are excluded.</p>
      ${hasMat ? "<p>Sold counts can be fractional (split deals) and use this report’s sold statuses, so totals may differ slightly from the KPI table above.</p>" : ""}
    </div>${matOther}`;
}
function renderStore(el, id) {
  const s = DATA.stores.find(x => x.id === id);
  if (!s) { el.innerHTML = `<div class="panel"><div class="panel-body"><p>Store not found. <a class="plain" href="#/overview">Back to overview</a></p></div></div>`; return; }
  const st = storeStatus(s);
  const c = s.kpiCurrent.total, p = s.kpiPrior && s.kpiPrior.total;
  const closing = c.goodLeads ? c.sold / c.goodLeads : null, pClosing = p && p.goodLeads ? p.sold / p.goodLeads : null;
  const twoDay = isTwoDay(s);
  const tiles = [
    { lbl: "Good leads", v: fmtN(c.goodLeads), pv: p && fmtN(p.goodLeads), d: p && deltaHtml(c.goodLeads, p.goodLeads) },
    { lbl: "Sold", v: fmtN(c.sold), pv: p && fmtN(p.sold), d: p && deltaHtml(c.sold, p.sold) },
    { lbl: "Closing rate", v: closing == null ? "—" : fmtPct(closing), pv: pClosing != null ? fmtPct(pClosing) : null, d: null },
    { lbl: "Internet contact %", v: fmtPct(c.contactPct, true), pv: p && fmtPct(p.contactPct, true), d: null },
    { lbl: "Appt set of contacted", v: fmtPct(c.apptSetOfContactedPct, true), pv: p && fmtPct(p.apptSetOfContactedPct, true), d: null },
    { lbl: "Appts shown", v: fmtN(c.apptsShown), pv: p && fmtN(p.apptsShown), d: p && deltaHtml(c.apptsShown, p.apptsShown) },
  ];
  el.innerHTML = `
    <nav class="crumb"><a class="plain" href="#/overview">← All stores</a>
      <label class="flabel">Switch store <select id="d-switch">${DATA.stores.map(x => `<option value="${esc(x.id)}"${x.id === s.id ? " selected" : ""}>${esc(x.name)}${x.demo ? " (demo)" : ""}</option>`).join("")}</select></label>
    </nav>
    <header>
      <div class="dhead"><h1>${esc(s.name)}</h1>${s.demo ? '<span class="badge-demo">DEMO</span>' : ""}${statusPill(st)}</div>
      <div class="dmeta">${chipsHtml(s)}<span>${esc(s.currentPeriod.label)}${s.priorPeriod ? " · compared with " + esc(s.priorPeriod.label) : ""}</span></div>
      <div class="dmeta">Status: <strong>${st.label}</strong> — ${esc(st.why)}</div>
      ${s.demo ? `<div class="banner demo">Demo store — illustrative numbers only, to preview how a ${esc(s.crm)}-based client plugs into the same dashboard.</div>` : ""}
      ${twoDay ? `<div class="banner info">Early-month sample: this comparison covers only the first 2 days of the month, so percentages swing widely.</div>` : ""}
    </header>
    <div class="tiles">${tiles.map(t => `<div class="tile"><div class="lbl">${t.lbl}</div><div class="v">${t.v}</div>${t.pv ? `<div class="vs">prev ${t.pv} ${t.d || ""}</div>` : ""}</div>`).join("")}</div>
    <div class="panel">
      <div class="panel-head"><h2 class="ttl">MTD KPI comparison <span class="sub">${p ? "current vs same days last month, by lead type" : "current period by lead type — no prior baseline provided"}</span></h2></div>
      ${kpiTable(s)}
    </div>
    <div class="panel" id="team-panel">
      <div class="panel-head"><h2 class="ttl">Salesperson activity <span class="sub">${esc(s.salesTeamPeriod || "")}${s.salesTeam && s.salesTeam.some(r => r.matador) ? " · CRM + Matador merged by rep" : ""}</span></h2></div>
      <div id="team-sec">${teamTable(s)}</div>
    </div>
    <p class="pagefoot">${esc(s.notes || "")}</p>`;
  $("#d-switch", el).onchange = e => { location.hash = "#/store/" + e.target.value; };
  el.querySelectorAll(".tgl").forEach(b => b.onclick = () => {
    const tid = b.dataset.tgl, open = b.getAttribute("aria-expanded") === "true";
    b.setAttribute("aria-expanded", String(!open));
    el.querySelectorAll(`[data-parent="${tid}"]`).forEach(tr => {
      if (open) {
        tr.hidden = true;
        const btn = tr.querySelector(".tgl");
        if (btn) { btn.setAttribute("aria-expanded", "false"); el.querySelectorAll(`[data-parent="${btn.dataset.tgl}"]`).forEach(x => x.hidden = true); }
      } else tr.hidden = false;
    });
  });
  function bindTeamSort() {
    el.querySelectorAll("#team-sec .sorth").forEach(b => b.onclick = () => {
      const k = b.dataset.sort;
      if (teamSort.key === k) teamSort.dir *= -1; else { teamSort.key = k; teamSort.dir = k === "name" ? 1 : -1; }
      const det = $("#team-sec details.extra", el);
      const wasOpen = det && det.open;
      $("#team-sec", el).innerHTML = teamTable(s);
      const det2 = $("#team-sec details.extra", el);
      if (det2 && wasOpen) det2.open = true;
      bindTeamSort();
    });
  }
  bindTeamSort();
}

/* ---------------- sources ---------------- */
function renderSources(el) {
  const apiChip = a => a === "available" ? '<span class="chip ok"><span class="dot"></span>API available</span>'
    : a === "requested" ? '<span class="chip pend"><span class="dot"></span>API access requested</span>'
    : '<span class="chip unk"><span class="dot"></span>API unknown</span>';
  const mailChip = m => m ? '<span class="chip ok"><span class="dot"></span>Daily email export</span>' : '<span class="chip no"><span class="dot"></span>Manual download only</span>';
  el.innerHTML = `
  <div class="pagehead">
    <div><h1>Data sources</h1><p class="sub">Per-system ingestion status across the client base</p></div>
  </div>
  <div class="src-grid">${DATA.integrations.map(i => `
    <div class="src">
      <div class="topline"><span class="nm">${esc(i.name)}</span><span class="ty">${esc(i.type)}</span></div>
      <div class="cov">${esc(i.coverage)}</div>
      <div class="chips">${apiChip(i.api)}${mailChip(i.scheduledEmail)}</div>
      <div class="note">${esc(i.note)}</div>
    </div>`).join("")}</div>
  <div class="pagehead" style="margin-top:6px"><div><h2>How data flows today</h2></div></div>
  <div class="flow">
    <div class="step"><div class="n">Step 1 · Collect</div><div class="t">Scheduled report emails</div><div class="d">Each CRM emails its Enterprise Performance / activity export daily. Matador is still a manual CSV from the Users tab.</div></div>
    <div class="step"><div class="n">Step 2 · Normalize</div><div class="t">Parse into one schema</div><div class="d">Store, period, lead type, inventory, salesperson — every source lands in the same shape, so stores on different CRMs compare apples to apples.</div></div>
    <div class="step"><div class="n">Step 3 · Publish</div><div class="t">Dashboard refresh</div><div class="d">Group overview for the consulting team; per-store login shows a dealership only its own numbers.</div></div>
    <div class="step"><div class="n">Next · APIs</div><div class="t">Replace email with APIs</div><div class="d">VinSolutions, Tekion and Momentum API access is in progress — that removes the email hop and enables intraday refresh.</div></div>
  </div>
  <p class="pagefoot">Prototype data: VinSolutions “Enterprise Performance” exports (run Jun 22 &amp; Jul 2, 2026) for Vern Eide Honda, 777 Nissan and Armstrong Subaru, plus the Matador MTD user report for Vern Eide Honda. Demo stores are illustrative.</p>`;
}

function renderHelp(el) {
  el.innerHTML = `
  <div class="pagehead"><div><h1>Help</h1><p class="sub">What you’re looking at, in 60 seconds</p></div></div>
  <div class="panel"><div class="panel-body prose">
    <h2 style="margin-top:0">What is this?</h2>

    <p>Ping Carlos — this prototype is built from the Jun 22 / Jul 2 report exports; the production version refreshes automatically from scheduled emails and, once granted, CRM APIs.</p>

/* ---------------- router ---------------- */
function render() {
  const el = $("#app");
  const h = location.hash || "#/overview";
  const storeM = h.match(/^#\/store\/(.+)$/);
  const view = storeM ? "store" : (h === "#/sources" ? "sources" : h === "#/settings" ? "settings" : h === "#/help" ? "help" : "overview");
  document.querySelectorAll(".nav").forEach(t => {
    const on = t.dataset.view === view || (view === "store" && t.dataset.view === "overview");
    t.classList.toggle("active", on);
    if (on) t.setAttribute("aria-current", "page"); else t.removeAttribute("aria-current");
  });
  if (view === "store") {
    let sid = storeM[1];
    try { sid = decodeURIComponent(sid); } catch (e) { /* malformed escape — falls through to "store not found" */ }
    renderStore(el, sid);
    const st = DATA.stores.find(x => x.id === sid);
    $("#live-status").textContent = st ? st.name : "Store not found";
  }
  else if (view === "sources") { renderSources(el); $("#live-status").textContent = "Data sources"; }
  else if (view === "settings") { renderSettings(el); $("#live-status").textContent = "Settings"; }
  else if (view === "help") { renderHelp(el); $("#live-status").textContent = "Help"; }
  else renderOverview(el); // updateOverview announces the store count
  window.scrollTo(0, 0);
}
document.querySelectorAll(".nav").forEach(t => t.onclick = () => { location.hash = "#/" + t.dataset.view; });
$("#asof").innerHTML = `Data as of Jun 22 &amp; Jul 2, 2026 · <b>${DATA.stores.filter(s => !s.demo).length} live stores</b>`;
const gq = $("#g-q");
$("#g-kbd").textContent = /Mac|iP(hone|ad|od)/.test((navigator.userAgentData && navigator.userAgentData.platform) || navigator.platform || "") ? "⌘F" : "Ctrl F";
gq.addEventListener("input", () => {
  state.q = gq.value;
  if (!(location.hash || "#/overview").match(/overview|^#?$/)) location.hash = "#/overview";
  const el = $("#app");
  if ($("#ov-rows", el)) updateOverview(el); else renderOverview(el);
});
window.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "f") { e.preventDefault(); gq.focus(); gq.select(); }
});
window.addEventListener("hashchange", render);
render();
</script>
